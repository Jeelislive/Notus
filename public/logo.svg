<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Icon mark: stylized N with waveform inside -->
  <g>
    <!-- Rounded square background -->
    <rect x="0" y="4" width="40" height="40" rx="10" fill="#6366F1"/>

    <!-- Waveform bars inside the square (centered) -->
    <!-- These represent audio/transcription -->
    <rect x="8"  y="20" width="3" height="8"  rx="1.5" fill="white" opacity="0.5"/>
    <rect x="13" y="15" width="3" height="18" rx="1.5" fill="white"/>
    <rect x="18" y="18" width="3" height="12" rx="1.5" fill="white" opacity="0.75"/>
    <rect x="23" y="13" width="3" height="22" rx="1.5" fill="white"/>
    <rect x="28" y="19" width="3" height="10" rx="1.5" fill="white" opacity="0.5"/>
  </g>

  <!-- Wordmark: "notus" -->
  <text
    x="52"
    y="32"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#0F172A"
  >notus</text>
</svg>
